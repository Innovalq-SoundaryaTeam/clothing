      <div class="admin-topbar">

      <!-- Settings Form: localStorage-backed store settings UI -->
<section class="admin-card"><h2>Store Settings</h2><div id="settingsMessage" class="form-success d-none mb-3"></div><form class="admin-form row g-3" id="storeSettingsForm"><div class="col-md-6"><label for="settingsStoreName">Store Name</label><input class="form-control" id="settingsStoreName" value="Rose & Thread"></div><div class="col-md-6"><label for="settingsEmail">Email</label><input class="form-control" id="settingsEmail" type="email" value="hello@roseandthread.com"></div><div class="col-md-6"><label for="settingsPhone">Phone</label><input class="form-control" id="settingsPhone" value="+91 90000 00000"></div><div class="col-md-6"><label for="settingsAddress">Address</label><input class="form-control" id="settingsAddress" value="12 Fashion Street, Coimbatore"></div><div class="col-12"><button class="btn-boutique" type="submit">Save Settings</button></div></form></section>
