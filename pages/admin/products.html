<!doctype html>
<html lang="en">
<head>
  <!-- Head Section: admin page meta, fonts, Bootstrap and CSS -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products | Admin</title>
  <meta name="description" content="Admin dashboard page for Rose and Thread Boutique static HTML template.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../../assets/css/style.css" rel="stylesheet">
  <link href="../../assets/css/dark-mode.css" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../../assets/images/logo.svg"/>
</head>
<body class="admin-body" data-admin-page="true">
  <!-- Admin Layout: sidebar navigation plus main dashboard content -->
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-brand" href="dashboard.html">Rose Admin</a>
      <ul class="admin-menu"><li><a class="" href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
<li><a class="active" href="products.html"><i class="fa-solid fa-shirt"></i> Products</a></li>
<li><a class="" href="orders.html"><i class="fa-solid fa-box"></i> Orders</a></li>
<li><a class="" href="customers.html"><i class="fa-solid fa-users"></i> Customers</a></li>
<li><a class="" href="messages.html"><i class="fa-solid fa-envelope"></i> Messages</a></li>
<li><a class="" href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        <li><a href="../index.html"><i class="fa-solid fa-store"></i> View Store</a></li>
      </ul>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <div><span class="eyebrow">Admin panel</span><h1>Products</h1><p class="mb-0 text-muted-custom">Welcome, <strong data-admin-name>Sarath</strong></p></div>
        <button class="logout-btn" data-logout type="button"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
      <!-- Products Table: localStorage-backed product management UI -->
<section class="admin-card"><div class="d-flex justify-content-between align-items-center mb-3"><h2>Products Management</h2><button class="btn-boutique" type="button" id="addProductBtn"><i class="fa-solid fa-plus"></i> Add Product</button></div><table class="admin-table"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th></tr></thead><tbody id="adminProductsTable"></tbody></table></section>

      <!-- Add / Edit Product Overlay: plain, self-contained (no Bootstrap JS modal) -->
      <div class="admin-overlay" id="productModal">
        <div class="admin-overlay-box">
          <button type="button" class="admin-overlay-close" id="productModalClose" aria-label="Close">&times;</button>
          <h5 id="productModalTitle" class="mb-3">Add Product</h5>
          <form id="productForm" novalidate>
            <input type="hidden" id="productId">
            <div class="mb-3">
              <label class="form-label" for="productName">Product Name</label>
              <input class="form-control" id="productName" type="text" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="productCategory">Category</label>
              <select class="form-select" id="productCategory">
                <option value="Women">Women</option>
                <option value="Men">Men</option>
                <option value="Kids">Kids</option>
                <option value="Accessories">Accessories</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label" for="productPrice">Price (₹)</label>
              <input class="form-control" id="productPrice" type="number" min="0" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="productStock">Stock</label>
              <input class="form-control" id="productStock" type="number" min="0" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="productStatus">Status</label>
              <select class="form-select" id="productStatus">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
            <button class="btn-boutique w-100" type="submit">Save Product</button>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/auth.js"></script>
</body>
</html>
